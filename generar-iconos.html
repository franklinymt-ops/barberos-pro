<!DOCTYPE html>
<html>
<head><title>Generador de Iconos BarberOS</title></head>
<body style="background:#111;color:#d4a843;font-family:sans-serif;padding:30px;text-align:center">
<h2>Generador de Iconos PWA - BarberOS</h2>
<p>Haz clic en cada botón para descargar el icono</p>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<br><br>
<button onclick="gen(192)" style="background:#d4a843;border:none;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin:8px">
  Descargar icon-192.png
</button>
<button onclick="gen(512)" style="background:#d4a843;border:none;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin:8px">
  Descargar icon-512.png
</button>
<p style="margin-top:20px;font-size:12px;color:#666">Sube ambos archivos a tu repositorio de GitHub (barberos-pro)</p>

<script>
function gen(size) {
  const c = document.getElementById("c"+size);
  const ctx = c.getContext("2d");
  const s = size;
  
  // Background
  const grad = ctx.createLinearGradient(0,0,s,s);
  grad.addColorStop(0,"#1a1500");
  grad.addColorStop(1,"#0a0a0b");
  ctx.fillStyle = grad;
  // Rounded rect
  ctx.beginPath();
  const r = s*0.15;
  ctx.moveTo(r,0); ctx.lineTo(s-r,0); ctx.quadraticCurveTo(s,0,s,r);
  ctx.lineTo(s,s-r); ctx.quadraticCurveTo(s,s,s-r,s);
  ctx.lineTo(r,s); ctx.quadraticCurveTo(0,s,0,s-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath(); ctx.fill();
  
  // Scissors ✂
  ctx.strokeStyle = "#d4a843";
  ctx.lineWidth = s*0.055;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  const cx=s/2, cy=s/2-s*0.05;
  const off=s*0.16;
  
  // Circles
  ctx.beginPath(); ctx.arc(cx-off,cy-off,s*0.078,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx+off,cy+off,s*0.078,0,Math.PI*2); ctx.stroke();
  // Lines
  ctx.beginPath(); ctx.moveTo(cx-off*0.6,cy-off*0.6); ctx.lineTo(cx+s*0.27,cy-s*0.27); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-off*0.6,cy-off*0.6); ctx.lineTo(cx+s*0.27,cy+s*0.27); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-s*0.27,cy+s*0.27); ctx.lineTo(cx+off*0.6,cy+off*0.6); ctx.stroke();
  
  // Text
  ctx.fillStyle = "#d4a843";
  ctx.font = `bold ${s*0.1}px Georgia,serif`;
  ctx.textAlign = "center";
  ctx.letterSpacing = "2px";
  ctx.fillText("BarberOS", s/2, s*0.88);
  
  // Download
  const a = document.createElement("a");
  a.download = "icon-"+size+".png";
  a.href = c.toDataURL("image/png");
  a.click();
}
</script>
</body>
</html>
