<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BarberOS — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0b;--surface:#111214;--card:#17191f;--border:#232630;--border2:#2c3040;
  --gold:#d4a843;--gold2:#f0c060;--gold-dim:rgba(212,168,67,.1);
  --white:#f0ede8;--muted:#555a68;--muted2:#7a8090;
  --green:#22c55e;--red:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--white);font-family:'Sora',sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden;padding:20px 16px 40px}

/* BG */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-grad{position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% -10%,rgba(212,168,67,.08),transparent 70%),var(--bg)}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(212,168,67,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(212,168,67,.03) 1px,transparent 1px);background-size:40px 40px}

/* WRAPPER */
.wrap{position:relative;z-index:1;width:100%;max-width:400px}

/* LOGO */
.logo-block{text-align:center;margin-bottom:28px;animation:fadeDown .5s ease both}
.logo-icon{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,var(--gold),#8b6314);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 10px;box-shadow:0 8px 28px rgba(212,168,67,.25)}
.logo-name{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;letter-spacing:2px}
.logo-name span{color:var(--gold)}
.logo-sub{font-size:11px;color:var(--muted2);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}

/* CARD */
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px 20px;box-shadow:0 24px 64px rgba(0,0,0,.5);animation:fadeUp .45s ease .1s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* TABS */
.tabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:20px;gap:0}
.tab{flex:1;padding:8px;border-radius:8px;border:none;background:none;color:var(--muted2);font-family:'Sora',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.tab.active{background:var(--card);color:var(--white);box-shadow:0 2px 8px rgba(0,0,0,.4)}

/* METHOD TABS (email / phone) */
.method-tabs{display:flex;gap:6px;margin-bottom:16px}
.mtab{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--border);background:none;color:var(--muted2);font-family:'Sora',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.mtab.active{border-color:var(--gold);background:var(--gold-dim);color:var(--gold)}

/* FORM */
.fg{margin-bottom:14px}
.fl{display:block;font-size:10px;font-weight:700;color:var(--muted2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px}
.fi{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px 13px;color:var(--white);font-family:'Sora',sans-serif;font-size:14px;transition:all .2s}
.fi:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,.1)}
.fi::placeholder{color:var(--muted)}
.phone-row{display:flex;gap:6px}
.country-code{width:70px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px 8px;color:var(--white);font-family:'JetBrains Mono',monospace;font-size:14px;text-align:center;transition:border-color .2s}
.country-code:focus{outline:none;border-color:var(--gold)}

/* TRIAL BADGE */
.trial-badge{display:flex;align-items:center;gap:8px;background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.18);border-radius:10px;padding:10px 12px;margin-bottom:18px}
.trial-txt{font-size:12px;color:var(--gold2);font-weight:600;line-height:1.4}

/* BUTTONS */
.btn{width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;font-family:'Sora',sans-serif;font-size:14px;font-weight:700;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;position:relative}
.btn-gold{background:linear-gradient(135deg,var(--gold),#a07820);color:#000;box-shadow:0 4px 16px rgba(212,168,67,.25)}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(212,168,67,.35)}
.btn-gold:active{transform:scale(.98)}
.btn-dark{background:var(--surface);border:1.5px solid var(--border2);color:var(--white);margin-top:8px;font-size:13px}
.btn-dark:hover{border-color:var(--muted2)}
.btn-google{background:#1e2028;border:1.5px solid var(--border2);color:var(--white);width:100%;padding:12px;border-radius:10px;border:none;cursor:pointer;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s;margin-top:8px}
.btn-google:hover{background:#252830}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-size:11px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* LOADING */
.btn.loading .btn-txt{opacity:0}
.btn.loading::after{content:'';position:absolute;width:18px;height:18px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MSG */
.msg{padding:10px 13px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:14px;display:none;line-height:1.5}
.msg.err{background:rgba(239,68,68,.1);color:#ff8090;border:1px solid rgba(239,68,68,.2);display:block}
.msg.ok{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);display:block}

/* LINK */
.auth-link{text-align:center;font-size:11px;color:var(--muted2);margin-top:14px}
.auth-link a{color:var(--gold);text-decoration:none;font-weight:700}
.forgot{font-size:10px;color:var(--muted2);text-decoration:none;float:right;margin-top:-2px;transition:color .15s}
.forgot:hover{color:var(--gold)}

/* OTP */
.otp-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:14px}
.otp-inp{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:12px 4px;text-align:center;color:var(--white);font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;transition:border-color .2s;width:100%}
.otp-inp:focus{outline:none;border-color:var(--gold)}

/* RECAPTCHA */
#recaptcha-container{margin-bottom:8px}

/* FOOTER */
.footer{text-align:center;font-size:11px;color:var(--muted);margin-top:18px;animation:fadeUp .5s ease .2s both}

/* STEP INDICATOR */
.step-ind{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:all .3s}
.step-dot.active{background:var(--gold);transform:scale(1.2)}
.step-dot.done{background:var(--green)}
</style>
</head>
<body>
<div class="bg"><div class="bg-grad"></div><div class="bg-grid"></div></div>

<div class="wrap">
  <div class="logo-block">
    <div class="logo-icon">✂</div>
    <div class="logo-name">Barber<span>OS</span></div>
    <div class="logo-sub">Plataforma SaaS para Barberías</div>
  </div>

  <div class="auth-card">
    <!-- TABS PRINCIPAL -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Iniciar Sesión</button>
      <button class="tab" onclick="switchTab('registro')">Registrarse</button>
    </div>

    <!-- MSG -->
    <div class="msg" id="msg"></div>

    <!-- ═══ LOGIN ═══ -->
    <div id="sec-login">
      <!-- Método: email o teléfono -->
      <div class="method-tabs">
        <button class="mtab active" onclick="switchMethod('email','login')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Correo
        </button>
        <button class="mtab" onclick="switchMethod('phone','login')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.59 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.16 6.16l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          Teléfono
        </button>
      </div>

      <!-- Email login -->
      <div id="login-email">
        <div class="fg">
          <label class="fl">Correo electrónico</label>
          <input type="email" class="fi" id="l-email" placeholder="tu@barberia.com" onkeydown="if(event.key==='Enter')loginEmail()">
        </div>
        <div class="fg">
          <label class="fl">Contraseña <a href="#" class="forgot" onclick="forgotPass(event)">¿Olvidaste?</a></label>
          <input type="password" class="fi" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')loginEmail()">
        </div>
        <button class="btn btn-gold" onclick="loginEmail()" id="btn-login-email">
          <span class="btn-txt">Entrar al Panel →</span>
        </button>
      </div>

      <!-- Phone login -->
      <div id="login-phone" style="display:none">
        <div class="fg">
          <label class="fl">Número de WhatsApp / Celular</label>
          <div class="phone-row">
            <input type="text" class="country-code" id="l-code" value="+57" maxlength="4">
            <input type="tel" class="fi" id="l-phone" placeholder="3001234567" style="flex:1" onkeydown="if(event.key==='Enter')loginPhone()">
          </div>
        </div>
        <div id="recaptcha-container"></div>
        <button class="btn btn-gold" onclick="loginPhone()" id="btn-login-phone">
          <span class="btn-txt">Enviar código SMS →</span>
        </button>
        <!-- OTP -->
        <div id="otp-sec-login" style="display:none;margin-top:14px">
          <div class="step-ind"><div class="step-dot done"></div><div class="step-dot active"></div></div>
          <label class="fl" style="text-align:center;margin-bottom:10px">Ingresa el código de 6 dígitos</label>
          <div class="otp-grid" id="otp-login-grid"></div>
          <button class="btn btn-gold" onclick="verificarOTPLogin()"><span class="btn-txt">Verificar y Entrar →</span></button>
          <button class="btn btn-dark" onclick="document.getElementById('otp-sec-login').style.display='none'">← Cambiar número</button>
        </div>
      </div>

      <div class="divider">o continúa con</div>
      <button class="btn-google" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuar con Google
      </button>
    </div>

    <!-- ═══ REGISTRO ═══ -->
    <div id="sec-registro" style="display:none">
      <div class="trial-badge">
        <div style="font-size:20px">🎉</div>
        <div class="trial-txt">7 días GRATIS · Sin tarjeta de crédito<br><span style="font-weight:400;opacity:.75">Acceso completo a todas las funciones</span></div>
      </div>

      <div class="method-tabs">
        <button class="mtab active" onclick="switchMethod('email','registro')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Correo
        </button>
        <button class="mtab" onclick="switchMethod('phone','registro')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.59 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.16 6.16l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          Teléfono
        </button>
      </div>

      <!-- Email registro -->
      <div id="reg-email">
        <div class="fg"><label class="fl">Nombre de tu barbería</label><input type="text" class="fi" id="r-barberia" placeholder="Ej: BarberShop El Rey"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" class="fg">
          <div><label class="fl">Tu nombre</label><input type="text" class="fi" id="r-nombre" placeholder="Nombre"></div>
          <div><label class="fl">WhatsApp</label><input type="tel" class="fi" id="r-wa" placeholder="3001234567"></div>
        </div>
        <div class="fg"><label class="fl">Correo electrónico</label><input type="email" class="fi" id="r-email" placeholder="tu@barberia.com"></div>
        <div class="fg"><label class="fl">Contraseña</label><input type="password" class="fi" id="r-pass" placeholder="Mínimo 6 caracteres"></div>
        <button class="btn btn-gold" onclick="registrarEmail()" id="btn-reg-email">
          <span class="btn-txt">Iniciar prueba gratis ✓</span>
        </button>
      </div>

      <!-- Phone registro -->
      <div id="reg-phone" style="display:none">
        <div class="fg"><label class="fl">Nombre de tu barbería</label><input type="text" class="fi" id="rp-barberia" placeholder="Ej: BarberShop El Rey"></div>
        <div class="fg"><label class="fl">Tu nombre</label><input type="text" class="fi" id="rp-nombre" placeholder="Nombre completo"></div>
        <div class="fg">
          <label class="fl">Número de celular</label>
          <div class="phone-row">
            <input type="text" class="country-code" id="rp-code" value="+57" maxlength="4">
            <input type="tel" class="fi" id="rp-phone" placeholder="3001234567" style="flex:1">
          </div>
        </div>
        <div id="recaptcha-reg-container"></div>
        <button class="btn btn-gold" onclick="registrarPhone()" id="btn-reg-phone">
          <span class="btn-txt">Enviar código SMS →</span>
        </button>
        <!-- OTP Registro -->
        <div id="otp-sec-reg" style="display:none;margin-top:14px">
          <div class="step-ind"><div class="step-dot done"></div><div class="step-dot active"></div></div>
          <label class="fl" style="text-align:center;margin-bottom:10px">Código de 6 dígitos enviado</label>
          <div class="otp-grid" id="otp-reg-grid"></div>
          <button class="btn btn-gold" onclick="verificarOTPReg()"><span class="btn-txt">Verificar y Crear Cuenta →</span></button>
          <button class="btn btn-dark" onclick="document.getElementById('otp-sec-reg').style.display='none'">← Cambiar número</button>
        </div>
      </div>

      <div class="auth-link">Al registrarte aceptas los <a href="#">términos de uso</a></div>
    </div>
  </div>

  <div class="footer">BarberOS © 2025 · Hecho en Colombia 🇨🇴</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, onAuthStateChanged,
  signInWithEmailAndPassword, createUserWithEmailAndPassword,
  signInWithPopup, GoogleAuthProvider,
  sendPasswordResetEmail,
  RecaptchaVerifier, signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, setDoc, getDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const FB={apiKey:"AIzaSyCaKIEWgvtTMLkIPnIeHj3PrVQ9iodV5dI",authDomain:"barberos-pro.firebaseapp.com",projectId:"barberos-pro",storageBucket:"barberos-pro.firebasestorage.app",messagingSenderId:"772002513976",appId:"1:772002513976:web:6cacb96069236dd8c6d2cd"};

const app = initializeApp(FB);
const auth = getAuth(app);
const db = getFirestore(app);
const googleProvider = new GoogleAuthProvider();
googleProvider.setCustomParameters({ prompt: 'select_account' });

const $ = id => document.getElementById(id);
let confirmationResult = null;
let recaptchaVerifierLogin = null;
let recaptchaVerifierReg = null;
let pendingPhoneData = {};

// Si ya está logueado → redirigir
onAuthStateChanged(auth, user => {
  if (user) irA('barbero-app-firebase.html');
});

// ── SWITCH TABS ──
window.switchTab = function(tab) {
  $('sec-login').style.display  = tab==='login' ? 'block' : 'none';
  $('sec-registro').style.display = tab==='registro' ? 'block' : 'none';
  document.querySelectorAll('.tabs .tab').forEach((t,i) =>
    t.classList.toggle('active',(tab==='login'&&i===0)||(tab==='registro'&&i===1))
  );
  showMsg('');
};

// ── SWITCH METHOD (email/phone) ──
window.switchMethod = function(method, section) {
  const isLogin = section === 'login';
  const emailDiv = isLogin ? 'login-email' : 'reg-email';
  const phoneDiv = isLogin ? 'login-phone' : 'reg-phone';
  $(emailDiv).style.display = method==='email' ? 'block' : 'none';
  $(phoneDiv).style.display = method==='phone' ? 'block' : 'none';
  // Actualizar tabs
  const parent = isLogin ? $('sec-login') : $('sec-registro');
  parent.querySelectorAll('.mtab').forEach((b,i) =>
    b.classList.toggle('active',(method==='email'&&i===0)||(method==='phone'&&i===1))
  );
  showMsg('');
  // Init recaptcha si cambia a teléfono
  if (method === 'phone') {
    setTimeout(() => initRecaptcha(isLogin), 300);
  }
};

// ── RECAPTCHA ──
function initRecaptcha(isLogin) {
  const containerId = isLogin ? 'recaptcha-container' : 'recaptcha-reg-container';
  const container = $(containerId);
  if (!container || container.childElementCount > 0) return;
  try {
    const verifier = new RecaptchaVerifier(auth, containerId, {
      size: 'normal',
      theme: 'dark',
      callback: () => {},
      'expired-callback': () => { showMsg('reCAPTCHA expirado, recarga la página','err'); }
    });
    verifier.render();
    if (isLogin) recaptchaVerifierLogin = verifier;
    else recaptchaVerifierReg = verifier;
  } catch(e) { console.warn('recaptcha:', e); }
}

// ── BUILD OTP GRID ──
function buildOTPGrid(gridId) {
  const grid = $(gridId);
  grid.innerHTML = Array.from({length:6}, (_,i) =>
    `<input class="otp-inp" id="${gridId}-${i}" maxlength="1" type="tel"
      oninput="otpNext(this,${i},'${gridId}')"
      onkeydown="otpBack(event,${i},'${gridId}')">`
  ).join('');
  setTimeout(() => $(`${gridId}-0`)?.focus(), 100);
}
window.otpNext = function(el, i, grid) {
  el.value = el.value.replace(/\D/g,'');
  if (el.value && i < 5) $(`${grid}-${i+1}`)?.focus();
};
window.otpBack = function(e, i, grid) {
  if (e.key==='Backspace' && !e.target.value && i > 0) $(`${grid}-${i-1}`)?.focus();
};
function getOTP(gridId) {
  return Array.from({length:6}, (_,i) => ($(`${gridId}-${i}`)?.value||'')).join('');
}

// ── LOGIN EMAIL ──
window.loginEmail = async function() {
  const email=$('l-email').value.trim(), pass=$('l-pass').value;
  if(!email||!pass){showMsg('Completa todos los campos','err');return;}
  setLoading('btn-login-email',true);
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    // onAuthStateChanged redirige
  } catch(e) {
    showMsg(tradErr(e.code),'err');
    setLoading('btn-login-email',false);
  }
};

// ── LOGIN GOOGLE ──
window.loginGoogle = async function() {
  showMsg('');
  try {
    const cred = await signInWithPopup(auth, googleProvider);
    const user = cred.user;
    // Si es nuevo usuario → crear barbería
    const snap = await getDoc(doc(db,'barberias',user.uid));
    if (!snap.exists()) {
      await crearBarberia(user.uid, {
        nombre: user.displayName||'Mi Barbería',
        email: user.email, wa:'', dueno: user.displayName||''
      });
    }
    // onAuthStateChanged redirige
  } catch(e) {
    if (e.code !== 'auth/popup-closed-by-user' && e.code !== 'auth/cancelled-popup-request')
      showMsg(tradErr(e.code),'err');
  }
};

// ── LOGIN TELÉFONO ──
window.loginPhone = async function() {
  const code = $('l-code').value.trim();
  const phone = $('l-phone').value.trim();
  if (!phone) { showMsg('Ingresa tu número','err'); return; }
  const full = code + phone.replace(/\D/g,'');
  setLoading('btn-login-phone', true);
  try {
    confirmationResult = await signInWithPhoneNumber(auth, full, recaptchaVerifierLogin);
    $('otp-sec-login').style.display = 'block';
    buildOTPGrid('otp-login-grid');
    showMsg('Código enviado a ' + full, 'ok');
  } catch(e) {
    showMsg(tradErr(e.code),'err');
  }
  setLoading('btn-login-phone', false);
};

window.verificarOTPLogin = async function() {
  const code = getOTP('otp-login-grid');
  if (code.length < 6) { showMsg('Ingresa los 6 dígitos','err'); return; }
  try {
    const cred = await confirmationResult.confirm(code);
    // Si usuario nuevo → crear barbería básica
    const snap = await getDoc(doc(db,'barberias',cred.user.uid));
    if (!snap.exists()) {
      await crearBarberia(cred.user.uid, {
        nombre:'Mi Barbería', email:'', wa:cred.user.phoneNumber||'', dueno:''
      });
    }
  } catch(e) {
    showMsg('Código incorrecto o expirado','err');
  }
};

// ── CREAR BARBERÍA ──
async function crearBarberia(uid, data) {
  const ahora = new Date();
  const trial = new Date(ahora); trial.setDate(trial.getDate()+7);
  await setDoc(doc(db,'barberias',uid), {
    nombre:data.nombre, dueno:data.dueno||'', email:data.email||'',
    wa:data.wa||'', plan:'trial',
    trialInicio:ahora.toISOString(), trialFin:trial.toISOString(),
    creadoEn:serverTimestamp(), activo:true
  });
  await setDoc(doc(db,'barberias',uid,'config','barberia'), {

  const servicios=[

    {id:"s4",nombre:"Degradado",precio:25000,orden:3},
    {id:"s5",nombre:"Corte infantil",precio:15000,orden:4},
    {id:"s6",nombre:"Diseño/líneas",precio:12000,orden:5},
    {id:"s7",nombre:"Keratina",precio:50000,orden:6},
    {id:"s8",nombre:"Color",precio:45000,orden:7},
  ];
  await Promise.all(servicios.map(s=>setDoc(doc(db,'barberias',uid,'servicios',s.id),{nombre:s.nombre,precio:s.precio,orden:s.orden})));
}

window.forgotPass = async function(e) {

  try {

};

// ── HELPERS ──
function setLoading(btnId, on) {
  const btn=$(btnId);
  if(btn) btn.classList.toggle('loading',on);
}
function showMsg(txt, type='') {
  const el=$('msg');
  el.textContent=txt;
  el.className='msg'+(type?' '+type:'');
  if(!type) el.style.display='none';
}
function tradErr(code) {
  const m={
    'auth/user-not-found':'No existe cuenta con ese correo',
    'auth/wrong-password':'Contraseña incorrecta',
    'auth/invalid-credential':'Correo o contraseña incorrectos',
    'auth/email-already-in-use':'Este correo ya está registrado',
    'auth/weak-password':'Contraseña muy corta (mínimo 6 caracteres)',
    'auth/invalid-email':'Formato de correo inválido',
    'auth/too-many-requests':'Demasiados intentos. Espera unos minutos',
    'auth/network-request-failed':'Sin conexión a internet',
    'auth/invalid-phone-number':'Número de teléfono inválido. Incluye código de país',
    'auth/quota-exceeded':'Límite de SMS alcanzado. Intenta con correo',
    'auth/captcha-check-failed':'Error de verificación. Recarga la página',
    'auth/invalid-verification-code':'Código incorrecto',
    'auth/code-expired':'Código expirado. Solicita uno nuevo',
    'auth/popup-blocked':'Popup bloqueado. Permite popups en tu navegador',
  };
  return m[code]||('Error: '+code);
}

// Helper rutas
function irA(archivo) {
  const base = location.href.replace(/[^/]*$/, '');
  window.location.href = base + archivo;
}
